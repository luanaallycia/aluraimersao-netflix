<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Selecione seu perfil para assistir">
    <title>Netflix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <header>
        <div class="header-container">
            <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix">
            <button id="theme-toggle" aria-label="Alternar modo claro/escuro">
                <img src="assets/sun.png" alt="Light mode" width="24" height="24">
            </button>
        </div>
    </header>
    
    <main>
        <section class="profile-selection" aria-label="Perfis de usuários">
            <h1>Quem está assistindo?</h1>
            <ul class="profiles">
                <li class="profile">
                    <a href="netflix-plataform-main/netflix-plataform-main/catalogo/catalogo.html">
                        <img src="assets/perfil-1.png" alt="Gato preto com olhos verdes">
                        <span>Rebeca</span>
                    </a>
                </li>
                <li class="profile">
                    <a href="netflix-plataform-main/netflix-plataform-main/catalogo/catalogo.html">
                        <img src="assets/perfil-2.jpg" alt="Cachorro preto com olhos castanhos">
                        <span>Marília</span>
                    </a>
                </li>
                <li class="profile">
                    <a href="netflix-plataform-main/netflix-plataform-main/catalogo/catalogo.html">
                        <img src="assets/perfil-3.png" alt="Cobra preta">
                        <span>Vicente</span>
                    </a>
                </li>
                <li class="profile">
                    <a href="netflix-plataform-main/netflix-plataform-main/catalogo/catalogo.html">
                        <img src="assets/perfil-4.jpg" alt="Lobo preto">
                        <span>Thiago</span>
                    </a>
                </li>
                 <li class="profile">
                    <a href="#">
                        <img src="assets/perfil-5.png" alt="Adicionar perfil">
                        <span>Add perfil</span>
                    </a>
                </li>
            </ul>
            <button class="manage-profiles-btn">Gerenciar perfis</button>
        </section>
    </main>

    <script src="tema.js"></script>
    <script>
        document.querySelectorAll('.profile a').forEach(a => {
            if (a.href !== '#') {
                a.addEventListener('click', () => {
                    const img = a.querySelector('img');
                    const span = a.querySelector('span');
                    const perfil = {
                        nome: span.textContent,
                        imagem: img.src
                    };
                    localStorage.setItem('perfilAtivo', JSON.stringify(perfil));
                    localStorage.setItem('perfilAtivoNome', perfil.nome);
                    localStorage.setItem('perfilAtivoImagem', perfil.imagem);
                });
            }
        });
    </script>
</body>
</html>
